name: Aprendiendo GitHub Actions #Nombre del Workflow
run-name: ¡Estoy aprendiendo GitHub Actions!
on: [push]
jobs:
  hola-mundo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: echo
        run: echo "Hola Mundo!"      
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Correr script
        run: node hola-mundo.js